name: Build and Save APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Flutter Clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare APK directory
        run: |
          mkdir -p apks
          rm -f apks/*.apk

      - name: Copy APK
        run: |
          SOURCE="build/app/outputs/flutter-apk/app-release.apk"
          DEST="apks/app-release.apk"

          if [ -f "$SOURCE" ]; then
            cp "$SOURCE" "$DEST"
            echo "APK size: $(du -h $DEST | cut -f1)"
          else
            echo "Source APK not found!"
            exit 1
          fi

      - name: Push APK to repository
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"

          git add apks/app-release.apk
          git commit -m "Auto-build APK $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push